name: CI

on:
  push:
    branches: [ main, Debug ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.10
      - name: Lint with ruff
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.10

      - name: Create Dummy Data
        run: |
          mkdir -p data/train/images data/val/images
          touch data/data.yaml
          echo 'path: data' > data/data.yaml
          echo 'train: train/images' >> data/data.yaml
          echo 'val: val/images' >> data/data.yaml
          echo 'names: {0: class0}' >> data/data.yaml

      - name: Run tests
        run: uv run pytest tests/ -v
